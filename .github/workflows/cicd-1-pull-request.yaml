name: "CI/CD - On Pull Request"

# The total recommended execution time for the "CI/CD Pull Request" workflow is around 20 minutes.
# Test comment

on:
  pull_request:
    types: [opened, reopened, ready_for_review, synchronize]

concurrency:
  group: pull-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read
  pull-requests: read

jobs:
  # Workflow design note:
  # - Non-Dependabot PRs run standard quality gates directly.
  # - Dependabot PRs may receive an auto-fix commit first (locks/docs/dependabot config),
  #   then quality gates run on the refreshed commit in the next workflow run.
  # Dependabot PRs should run core validation checks (metadata, coding standards, validation tests).
  # Only advisory commit-message style checks remain human-focused.
  metadata:
    if: github.event.pull_request.draft == false
    name: "Set Metadata"
    runs-on: ubuntu-latest
    timeout-minutes: 1
    outputs:
      build_datetime_london: ${{ steps.set-metadata.outputs.build_datetime_london }}
      build_datetime: ${{ steps.set-metadata.outputs.build_datetime }}
      build_timestamp: ${{ steps.set-metadata.outputs.build_timestamp }}
      build_epoch: ${{ steps.set-metadata.outputs.build_epoch }}
      nodejs_version: ${{ steps.set-metadata.outputs.nodejs_version }}
      python_version: ${{ steps.set-metadata.outputs.python_version }}
      terraform_version: ${{ steps.set-metadata.outputs.terraform_version }}
      version: ${{ steps.set-metadata.outputs.version }}
      action: ${{ steps.set-metadata.outputs.action }}
      environment: ${{ steps.set-metadata.outputs.environment }}
      nation: ${{ steps.set-metadata.outputs.nation }}
      branch_name: ${{ steps.set-metadata.outputs.branch_name }}
      sql_file: ${{ steps.set-metadata.outputs.sql_file }}
      image_tag: ${{ steps.set-metadata.outputs.image_tag }}
    steps:
      - name: "Checkout code"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: "Set CI/CD metadata"
        id: set-metadata
        uses: ./.github/actions/set-metadata
        with:
          calling_workflow: ${{ github.workflow }}
          nation: ${{ inputs.nation || 'en' }}
          environment: ${{ inputs.environment || 'autotest' }}
          action: ${{ inputs.action || 'apply' }}
          sql_file: ${{ inputs.sql_file || 'coreData.sql' }}

  dependabot-auto-fix-terraform:
    name: "Dependabot auto-fix Terraform docs/locks"
    needs: [metadata]
    # Restrict auto-fix writes to Dependabot branches in the same repository.
    # Fork PRs are excluded to avoid unsafe write operations.
    if: >-
      github.event.pull_request.draft == false &&
      github.actor == 'dependabot[bot]' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
      issues: write
    outputs:
      changed: ${{ steps.detect.outputs.changed }}
    steps:
      - name: "Checkout PR branch"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: "Set up mise"
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0

      - name: "Install pinned tools"
        shell: bash
        run: mise install

      - name: "Upgrade Terraform locks and run regeneration hooks"
        shell: bash
        run: |
          # Compare PR head against base to find modules with provider constraint changes.
          base_sha="${{ github.event.pull_request.base.sha }}"

          mapfile -t modules_to_upgrade < <(
            git diff --name-only "$base_sha...HEAD" \
              | grep '^infrastructure/modules/.*/versions\.tf$' \
              # -r avoids calling dirname with empty stdin when grep finds no matches.
              | xargs -r -n1 dirname \
              | sort -u
          )

          if [[ ${#modules_to_upgrade[@]} -gt 0 ]]; then
            for module_path in "${modules_to_upgrade[@]}"; do
              echo "Upgrading Terraform lock file for $module_path"
              # init -upgrade refreshes provider selection; providers lock writes platform hashes.
              terraform -chdir="$module_path" init -upgrade -no-color
              terraform -chdir="$module_path" providers lock \
                -platform=linux_arm64 \
                -platform=linux_amd64 \
                -platform=darwin_arm64 \
                -platform=darwin_amd64 \
                -platform=windows_amd64
            done
          else
            echo "No module versions.tf changes detected; skipping explicit lock upgrade loop."
          fi

          # terraform_docs intentionally exits non-zero when it rewrites docs.
          # Keep running so changes can be detected and committed in this job.
          mise x -- pre-commit run --all-files generate-terraform-providers
          mise x -- pre-commit run --all-files terraform_providers_lock
          mise x -- pre-commit run --all-files terraform_docs || true
          mise x -- pre-commit run --all-files regenerate-dependabot-config

      - name: "Detect changes"
        id: detect
        shell: bash
        run: |
          # Expose whether any auto-fix output changed tracked files.
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # Optional (disabled): enable GPG-signed auto-fix commits.
      # Prerequisites:
      # - Configure secrets: AUTOFIX_GPG_PRIVATE_KEY, AUTOFIX_GPG_PASSPHRASE,
      #   AUTOFIX_GIT_NAME, AUTOFIX_GIT_EMAIL, and AUTOFIX_PUSH_TOKEN.
      # - Ensure AUTOFIX_GIT_EMAIL is verified on the GitHub account that owns the GPG key.
      # - Update checkout step above to use:
      #   token: ${{ secrets.AUTOFIX_PUSH_TOKEN }}
      # - Uncomment this step and signed commit commands below.
      # - name: "Import GPG key for signed commits"
      #   if: steps.detect.outputs.changed == 'true'
      #   uses: crazy-max/ghaction-import-gpg@<PINNED_SHA>
      #   with:
      #     gpg_private_key: ${{ secrets.AUTOFIX_GPG_PRIVATE_KEY }}
      #     passphrase: ${{ secrets.AUTOFIX_GPG_PASSPHRASE }}
      #     git_user_signingkey: true
      #     git_commit_gpgsign: true

      - name: "Commit and push auto-fixes"
        # Push an auto-fix commit so the next PR workflow run validates the refreshed content.
        if: steps.detect.outputs.changed == 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # For signed commits, use the automation identity configured for the imported GPG key:
          # git config user.name "${{ secrets.AUTOFIX_GIT_NAME }}"
          # git config user.email "${{ secrets.AUTOFIX_GIT_EMAIL }}"
          git add -A
          git commit -m "chore(dependabot): regenerate terraform docs and lockfiles"
          # Signed variant:
          # git commit -S -m "chore(dependabot): regenerate terraform docs and lockfiles"
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"

      - name: "Comment on PR with auto-fix summary"
        if: steps.detect.outputs.changed == 'true'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          github-token: ${{ github.token }}
          script: |
            const marker = '<!-- dependabot-terraform-autofix -->';
            const body = `${marker}
            Dependabot Terraform auto-fix applied by CI.

            The workflow regenerated and committed:
            - Terraform provider lock files (`terraform init -upgrade` + `terraform providers lock`)
            - Module docs (`terraform_docs`)
            - Dependabot configuration (`regenerate-dependabot-config`)

            A new commit was pushed to this PR branch, so checks will re-run automatically.`;

            const issue_number = context.payload.pull_request.number;
            const { owner, repo } = context.repo;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find(
              (c) => c.user?.login === 'github-actions[bot]' && c.body?.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

  coding-standards: # Recommended maximum execution time is 5 minutes
    name: "Enforce Coding Standards"
    needs: [metadata, dependabot-auto-fix-terraform]
    # Condition intent:
    # - Always require successful metadata.
    # - For non-Dependabot PRs: run normally.
    # - For Dependabot PRs: run only when auto-fix ran successfully and produced no new commit
    #   (if it produced changes, this run is skipped and the next run validates the new commit).
    if: >-
      always() &&
      github.event.pull_request.draft == false &&
      needs.metadata.result == 'success' &&
      (
        github.actor != 'dependabot[bot]' ||
        (
          needs.dependabot-auto-fix-terraform.result == 'success' &&
          needs.dependabot-auto-fix-terraform.outputs.changed != 'true'
        )
      )
    uses: ./.github/workflows/stage-1-coding-standards.yaml
    with:
      build_datetime: "${{ needs.metadata.outputs.build_datetime }}"
      build_timestamp: "${{ needs.metadata.outputs.build_timestamp }}"
      build_epoch: "${{ needs.metadata.outputs.build_epoch }}"
      nodejs_version: "${{ needs.metadata.outputs.nodejs_version }}"
      python_version: "${{ needs.metadata.outputs.python_version }}"
      terraform_version: "${{ needs.metadata.outputs.terraform_version }}"
      version: "${{ needs.metadata.outputs.version }}"
    secrets: inherit

  conventional-commit-advisory:
    name: "Conventional Commit Advisory"
    # Bot PR commit formats are tool-generated and non-blocking by design.
    if: github.event.pull_request.draft == false && github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: "Review PR commit messages (non-blocking)"
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        continue-on-error: true
        with:
          github-token: ${{ github.token }}
          script: |
            const pr = context.payload.pull_request;
            if (!pr) {
              core.warning('No pull_request payload found. Skipping Conventional Commit advisory check.');
              return;
            }

            // Conventional Commits: type(scope optional)!: description
            const pattern = /^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\([A-Za-z0-9._/-]+\))?(!)?: .+/;

            const commits = await github.paginate(github.rest.pulls.listCommits, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 100,
            });

            const invalid = commits
              .map(c => ({
                sha: c.sha,
                headline: (c.commit?.message || '').split('\n')[0] || '',
              }))
              .filter(c => !pattern.test(c.headline));

            if (invalid.length === 0) {
              core.info('All PR commit messages are Conventional Commit compliant.');
              await core.summary
                .addHeading('Conventional Commit advisory')
                .addRaw('All commit messages in this PR are compliant.\n')
                .write();
              return;
            }

            const details = invalid
              .map(c => `- ${c.headline} (${c.sha.slice(0, 7)})`)
              .join('\n');

            core.warning(
              `Found ${invalid.length} non-compliant commit message(s). This is advisory only and does not fail the workflow.\n${details}`
            );

            await core.summary
              .addHeading('Conventional Commit advisory')
              .addRaw(`Found ${invalid.length} non-compliant commit message(s).\n\n`)
              .addCodeBlock(details)
              .addRaw('\nExamples: feat(ci): add PR checks, fix(terraform): correct provider version\n')
              .write();

  validation-tests:
    name: "Validation Tests"
    needs: [metadata, dependabot-auto-fix-terraform]
    # Mirrors coding-standards gating to avoid validating stale pre-auto-fix content.
    if: >-
      always() &&
      github.event.pull_request.draft == false &&
      needs.metadata.result == 'success' &&
      (
        github.actor != 'dependabot[bot]' ||
        (
          needs.dependabot-auto-fix-terraform.result == 'success' &&
          needs.dependabot-auto-fix-terraform.outputs.changed != 'true'
        )
      )
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: "Checkout code"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: "Set up mise"
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0

      - name: "Install pinned tools"
        shell: bash
        run: mise install

      - name: "Run validation test suite"
        shell: bash
        run: make test-validations

  # enforce-pr-title-format: #
  #   name: "Enforce Conventional Commit format"
  #   runs-on: ubuntu-latest
  #   if: github.event.pull_request.draft == false && github.actor != 'dependabot[bot]'
  #   permissions:
  #     issues: write
  #     contents: read
  #   steps:
