  #       uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

  #     - name: Generate a token
  #       id: generate-token
  #       uses: actions/create-github-app-token@v3
  #       with:
  #         app-id: ${{ vars.GH_APP_ID }}
  #         private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}

  #     - name: Check Conventional Commit format
  #       uses: ./.github/actions/enforce-pr-title-format
  #       with:
  #         github-token: ${{ steps.generate-token.outputs.token }}
  #         validate-pr-title: "true"
  #         validate-commit-messages: "true"

  # Final job to ensure all required jobs completed successfully.
  # This allows branch protection to target a single status check.
  all-checks-complete:
    name: "All Checks Complete"
    if: always()
    needs:
      - metadata
      - dependabot-auto-fix-terraform
      - coding-standards
      - conventional-commit-advisory
      - validation-tests
    runs-on: ubuntu-latest
    steps:
      - name: "Check all jobs succeeded"
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            echo "One or more jobs failed"
            exit 1
          elif [[ "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "One or more jobs were cancelled"
            exit 1
          else
            echo "All jobs completed successfully"
          fi
