name: "CI/CD publish"

permissions:
  id-token: write
  contents: write
  repository-projects: write

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  metadata:
    name: "Set Metadata"
    runs-on: ubuntu-latest
    timeout-minutes: 1
    outputs:
      build_datetime_london: ${{ steps.set-metadata.outputs.build_datetime_london }}
      build_datetime: ${{ steps.set-metadata.outputs.build_datetime }}
      build_timestamp: ${{ steps.set-metadata.outputs.build_timestamp }}
      build_epoch: ${{ steps.set-metadata.outputs.build_epoch }}
      nodejs_version: ${{ steps.set-metadata.outputs.nodejs_version }}
      python_version: ${{ steps.set-metadata.outputs.python_version }}
      terraform_version: ${{ steps.set-metadata.outputs.terraform_version }}
      version: ${{ steps.set-metadata.outputs.version }}
      action: ${{ steps.set-metadata.outputs.action }}
      environment: ${{ steps.set-metadata.outputs.environment }}
      nation: ${{ steps.set-metadata.outputs.nation }}
      branch_name: ${{ steps.set-metadata.outputs.branch_name }}
      sql_file: ${{ steps.set-metadata.outputs.sql_file }}
      image_tag: ${{ steps.set-metadata.outputs.image_tag }}

    steps:
      - name: "Checkout code"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: "Set CI/CD metadata"
        id: set-metadata
        uses: ./.github/actions/set-metadata
        with:
          calling_workflow: ${{ github.workflow }}
  publish:
    name: "Publish packages"
    runs-on: ubuntu-latest
    needs: [metadata]
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
    timeout-minutes: 10
    steps:
      - name: "Checkout code"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: "Set correct Node.js version"
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ needs.metadata.outputs.nodejs_version }}
      - name: "Install dependencies"
        run: |
          npm install \
            @semantic-release/changelog@6.0.3 \
            @semantic-release/git@10.0.1 \
            @semantic-release/exec@7.1.0 \
            conventional-changelog-conventionalcommits@9.1.0
      - name: "Semantic Release"
        id: semantic-release
        uses: cycjimmy/semantic-release-action@b12c8f6015dc215fe37bc154d4ad456dd3833c90 # v6.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
