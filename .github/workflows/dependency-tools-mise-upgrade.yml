name: "Dependency Tools - Mise Upgrade"

on:
  workflow_dispatch:
    inputs:
      upgrade_level:
        description: "Upgrade level to apply"
        required: false
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major
          - all
  schedule:
    - cron: "0 9 * * 1"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: dependency-tools-mise-upgrade
  cancel-in-progress: false

jobs:
  upgrade-mise-tools:
    name: "Upgrade mise-managed tools"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: "Checkout code"
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: "Set up mise"
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0

      - name: "Update tool versions and lockfile"
        env:
          UPGRADE_LEVEL: ${{ github.event.inputs.upgrade_level }}
        shell: bash
        run: |
          level="${UPGRADE_LEVEL:-patch}"
          bash scripts/mise/update-tool-versions.sh --upgrade-level "$level"

      - name: "Create pull request"
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          commit-message: "build(deps): update mise-managed tool versions"
          title: "build(deps): update mise-managed tool versions"
          body: |
            Automated update of mise-managed tool versions.

            Updated files:
            - .tool-versions
            - mise.toml
            - mise.lock

            Upgrade level: `${{ github.event.inputs.upgrade_level || 'patch' }}`

            Generated by dependency-tools-mise-upgrade workflow.
          branch: "automation/mise-tool-versions"
          delete-branch: true
          labels: |
            dependencies
          add-paths: |
            .tool-versions
            mise.toml
            mise.lock
