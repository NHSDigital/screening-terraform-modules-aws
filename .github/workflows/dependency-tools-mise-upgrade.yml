name: "Dependency Tools - Mise Upgrade"

on:
  workflow_dispatch:
  schedule:
    - cron: "0 9 * * 1"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: dependency-tools-mise-upgrade
  cancel-in-progress: false

jobs:
  upgrade-mise-tools:
    name: "Upgrade mise-managed tools"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: "Checkout code"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: "Set up mise"
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0

      - name: "Update tool versions and lockfile"
        shell: bash
        run: |
          bash scripts/mise/update-tool-versions.sh

      - name: "Create pull request"
        uses: peter-evans/create-pull-request@22a9089034f40e5a961c8808d113e2c98fb63676 # v7
        with:
          commit-message: "build(deps): update mise-managed tool versions"
          title: "build(deps): update mise-managed tool versions"
          body: |
            Automated update of mise-managed tool versions.

            Updated files:
            - .tool-versions
            - mise.toml
            - mise.lock

            Generated by dependency-tools-mise-upgrade workflow.
          branch: "automation/mise-tool-versions"
          delete-branch: true
          labels: |
            dependencies
          add-paths: |
            .tool-versions
            mise.toml
            mise.lock
