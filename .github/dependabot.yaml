version: 2

# Optional schedule controls (enable later if needed):
# schedule:
#   interval: "weekly"
#   day: "monday"
#   time: "08:00"
#   timezone: "Europe/London"

updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    open-pull-requests-limit: 10
    pull-request-branch-name:
      separator: "-"
    labels:
      - "dependencies"
    groups:
      github-actions-minor-patch:
        applies-to: "version-updates"
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
      github-actions-security:
        applies-to: "security-updates"
        patterns:
          - "*"

  # BEGIN_AUTOGENERATED_TERRAFORM_UPDATES
  - package-ecosystem: "terraform"
    directories:
      - "infrastructure/modules/acm"
      - "infrastructure/modules/api-gateway"
      - "infrastructure/modules/aws-backup-destination"
      - "infrastructure/modules/aws-backup-source"
      - "infrastructure/modules/aws-scheduler"
      - "infrastructure/modules/cognito"
      - "infrastructure/modules/cw-firehose-splunk"
      - "infrastructure/modules/ec2-instance"
      - "infrastructure/modules/ecr"
      - "infrastructure/modules/ecs-cluster"
      - "infrastructure/modules/elasticache"
      - "infrastructure/modules/github-config"
      - "infrastructure/modules/guardduty"
      - "infrastructure/modules/iam"
      - "infrastructure/modules/inspector"
      - "infrastructure/modules/kms"
      - "infrastructure/modules/lambda-layer"
      - "infrastructure/modules/lambda"
      - "infrastructure/modules/license-manager"
      - "infrastructure/modules/network-firewall"
      - "infrastructure/modules/parameter_store"
      - "infrastructure/modules/r53-healthcheck"
      - "infrastructure/modules/r53"
      - "infrastructure/modules/rds-database"
      - "infrastructure/modules/rds-gateway-ecs-task"
      - "infrastructure/modules/rds-instance"
      - "infrastructure/modules/rds-users"
      - "infrastructure/modules/rds"
      - "infrastructure/modules/s3-bucket"
      - "infrastructure/modules/s3"
      - "infrastructure/modules/secrets-manager"
      - "infrastructure/modules/security-group"
      - "infrastructure/modules/security-hub"
      - "infrastructure/modules/sns"
      - "infrastructure/modules/sqs"
      - "infrastructure/modules/tags"
      - "infrastructure/modules/vpc"
      - "infrastructure/modules/vpce"
      - "infrastructure/modules/vpces"
      - "infrastructure/modules/waf"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    open-pull-requests-limit: 10
    pull-request-branch-name:
      separator: "-"
    labels:
      - "dependencies"
    groups:
      terraform-minor-patch:
        applies-to: "version-updates"
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
      terraform-security:
        applies-to: "security-updates"
        patterns:
          - "*"

  # END_AUTOGENERATED_TERRAFORM_UPDATES

  - package-ecosystem: "docker"
    directories:
      - "/scripts/docker"
      - "/scripts/docker/tests"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    open-pull-requests-limit: 10
    pull-request-branch-name:
      separator: "-"
    labels:
      - "dependencies"
    groups:
      docker-minor-patch:
        applies-to: "version-updates"
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
      docker-security:
        applies-to: "security-updates"
        patterns:
          - "*"
