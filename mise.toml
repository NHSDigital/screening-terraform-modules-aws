
[settings]
lockfile = true
auto_install = true
idiomatic_version_file_enable_tools = ["node", "python", "terraform"]

[tools]
# @name=actionlint @url=https://github.com/rhysd/actionlint @purpose=GitHub Actions linter
actionlint = "1.7.12"
# @name=bats-core @url=https://github.com/bats-core/bats-core @purpose=Bash test framework
bats = "1.13.0"
# @name=Gitleaks @url=https://github.com/gitleaks/gitleaks @purpose=Secret scanning
gitleaks = "8.30.1"
go = "1.26.4" # needed for installing go-based tools from source
# @name=jq @url=https://jqlang.github.io/jq/ @purpose=JSON processor
jq = "1.8.1"
# @name=GNU make @url=https://www.gnu.org/software/make/ @purpose=Task runner @prefix=>=
make = "4.4.1" # default version on macos is too old
nodejs = "24.16.0"
# @name=pre-commit @url=https://pre-commit.com/ @purpose=Git hook framework
pre-commit = "4.6.0"
python = "3.14"
# @name=shellcheck @url=https://www.shellcheck.net/ @purpose=Shell script linter
shellcheck = "0.11.0"
# @name=Terraform @url=https://www.terraform.io/ @purpose=Infrastructure as code @prefix=>=
terraform = "1.13.5"
# @name=terraform-docs @url=https://terraform-docs.io/ @purpose=Auto-generate module documentation
terraform-docs = "0.24.0"
# @name=tflint @url=https://github.com/terraform-linters/tflint @purpose=Terraform linter
tflint = "0.63.1"
# @name=Vale @url=https://vale.sh/ @purpose=English prose linter
vale = "3.15.1"
# @name=yq @url=https://github.com/mikefarah/yq @purpose=YAML processor (Go implementation)
yq = "4.53.3"

# Go-based tools (backend syntax requires quoting)
# @name=terraform-config-inspect @url=https://github.com/hashicorp/terraform-config-inspect @purpose=Generate aliased providers for validation
"go:github.com/hashicorp/terraform-config-inspect" = "latest"

# Referenced tasks (used by current automation/documentation)

[tasks.update-tool-versions]
description = "Update mise-managed tool versions, sync manifests, refresh README prerequisites, and regenerate lockfile"
run = "scripts/mise/update-tool-versions.sh"

[tasks.generate-dependabot-config]
description = "Generate Dependabot configuration from infrastructure/modules"
run = "scripts/generate-dependabot-config.sh"

[tasks.shellscript-linter]
description = "Run shell script lint wrapper"
run = "scripts/shellscript-linter.sh"

[tasks.terraform-upgrade-module]
description = "Refresh Terraform lockfiles/docs for a module or all modules"
run = "scripts/terraform/upgrade-module.sh"

[tasks.terraform-derive-module-constraints]
description = "Derive Terraform module constraints"
run = "scripts/terraform/derive-module-constraints.sh"

[tasks.terraform-wrapper]
description = "Run repository Terraform wrapper"
run = "scripts/terraform/terraform.sh"

[tasks.reports-create-lines-of-code]
description = "Generate lines-of-code report"
run = "scripts/reports/create-lines-of-code-report.sh"

[tasks.reports-create-sbom]
description = "Generate software bill of materials report"
run = "scripts/reports/create-sbom-report.sh"

[tasks.reports-perform-static-analysis]
description = "Run static analysis report generation"
run = "scripts/reports/perform-static-analysis.sh"

[tasks.reports-scan-vulnerabilities]
description = "Scan generated SBOM for vulnerabilities"
run = "scripts/reports/scan-vulnerabilities.sh"

[tasks.githooks-check-dependabot-config]
description = "Check and regenerate Dependabot configuration"
run = "scripts/githooks/check-dependabot-config.sh"

[tasks.githooks-check-english-usage]
description = "Run English usage checks"
run = "scripts/githooks/check-english-usage.sh"

[tasks.githooks-check-file-format]
description = "Run file format checks"
run = "scripts/githooks/check-file-format.sh"

[tasks.githooks-check-markdown-format]
description = "Run Markdown format checks"
run = "scripts/githooks/check-markdown-format.sh"

[tasks.githooks-check-terraform-format]
description = "Run Terraform format checks"
run = "scripts/githooks/check-terraform-format.sh"

[tasks.githooks-generate-terraform-providers]
description = "Generate aliased Terraform provider stubs"
run = "scripts/githooks/generate-terraform-providers.sh"

[tasks.githooks-scan-secrets]
description = "Scan for hardcoded secrets"
run = "scripts/githooks/scan-secrets.sh"

[tasks.githooks-validate-conventional-commit]
description = "Validate Conventional Commit message format"
run = "scripts/githooks/validate-conventional-commit.sh"

