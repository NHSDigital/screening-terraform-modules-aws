
[settings]
lockfile = true
auto_install = true
idiomatic_version_file_enable_tools = ["node", "python", "terraform"]

[tools]
terraform = "1.13.2"
tflint = "0.59.1"
terraform-docs = "0.24.0"
pre-commit = "4.6.0"
python = "3.12"
vale = "3.6.0"
gitleaks = "8.30.1"
shellcheck = "0.11.0"
jq = "1.7.1"
nodejs = "24.16.0"
go = "1.26.4" # needed for installing go-based tools from source
make = "4.4.1" # default version on macos is too old

# Go-based tools using backend syntax
"go:github.com/hashicorp/terraform-config-inspect" = "latest"
