# Module Metadata
#
# Maps module names to their descriptions and wrapped community modules.
# Used by generate-available-modules.sh to produce the Available modules section.
#
# Format:
#   module_name:
#     description: "Human-readable description"
#     wraps: "terraform-aws-modules/xyz/aws" or "—" or "Native resources"
#

